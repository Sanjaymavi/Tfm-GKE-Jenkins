apiVersion: v1
kind: Pod
metadata:
  labels:
    app: jenkins-kaniko
spec:
  serviceAccountName: kaniko-ksa

  containers:
    - name: kaniko
      image: gcr.io/kaniko-project/executor:latest
      args:
        - "--dockerfile=/dev/null"   # dummy
      tty: true

    - name: kubectl
      image: google/cloud-sdk:latest
      command:
        - /bin/sh
      args:
        - -c
        - sleep 999999
      tty: true
